site_name: Todo Manager Documentation
site_url: https://thiagodeps.github.io/todolist2/
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy

use_directory_urls: true
plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
        - locale: pt
          name: Português
          build: true
      nav_translations:
        pt:
          Home: Início
          Specifications: Especificações
          Contracts: Contratos
          Policy: Políticas
          Spec: Especificação
          Data Model: Modelo de Dados
          Research: Pesquisa
          Implementation Plan: Plano de Implementação
          Tasks: Tarefas
          Quickstart: Início Rápido
          Constitution: Constituição
          API v1: API v1

nav:
  - Home: index.md
  - Specifications:
    - Spec: specs/spec.md
    - Data Model: specs/data-model.md
    - Research: specs/research.md
    - Implementation Plan: specs/plan.md
    - Tasks: specs/tasks.md
    - Quickstart: specs/quickstart.md
  - Contracts:
    - API v1: contracts/api-v1.md
  - Policy:
    - Constitution: memory/constitution.md
